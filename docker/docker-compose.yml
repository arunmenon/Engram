services:
  redis:
    image: redis/redis-stack:latest
    container_name: engram-redis
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/redis-stack.conf
    environment:
      - REDIS_ARGS=--include /redis-stack.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:5-community
    container_name: engram-neo4j
    ports:
      - "7687:7687"  # Bolt
      - "7474:7474"  # Browser
    volumes:
      - neo4j-data:/data
      - ./neo4j/constraints.cypher:/var/lib/neo4j/constraints/constraints.cypher
      - ./neo4j/init.sh:/docker-entrypoint-initdb.d/init.sh
    environment:
      - NEO4J_AUTH=neo4j/engram-dev-password
      - NEO4J_PLUGINS=[]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=128m
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # -----------------------------------------------------------------------
  # GCS Emulator — cold-tier archive storage (ADR-0014)
  # -----------------------------------------------------------------------

  fake-gcs:
    image: fsouza/fake-gcs-server:1.50
    container_name: engram-fake-gcs
    ports:
      - "4443:4443"
    command: ["-scheme", "http", "-port", "4443"]
    volumes:
      - gcs-data:/data
      - ./gcs/init:/data/engram-archives  # pre-creates the bucket
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4443/storage/v1/b"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - CG_REDIS_HOST=redis
      - CG_REDIS_PORT=6379
      - CG_NEO4J_URI=bolt://neo4j:7687
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/v1/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # -----------------------------------------------------------------------
  # Consumer Workers — read from Redis Streams, project into Neo4j
  # -----------------------------------------------------------------------

  worker-projection:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: ["--consumer", "projection"]
    environment:
      - CG_REDIS_HOST=redis
      - CG_REDIS_PORT=6379
      - CG_NEO4J_URI=bolt://neo4j:7687
      - CG_LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  worker-enrichment:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: ["--consumer", "enrichment"]
    environment:
      - CG_REDIS_HOST=redis
      - CG_REDIS_PORT=6379
      - CG_NEO4J_URI=bolt://neo4j:7687
      - CG_LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  worker-extraction:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: ["--consumer", "extraction"]
    environment:
      - CG_REDIS_HOST=redis
      - CG_REDIS_PORT=6379
      - CG_NEO4J_URI=bolt://neo4j:7687
      - CG_LLM_MODEL_ID=${CG_LLM_MODEL_ID:-gpt-5.2-2025-12-11}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CG_LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  worker-consolidation:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: ["--consumer", "consolidation"]
    environment:
      - CG_REDIS_HOST=redis
      - CG_REDIS_PORT=6379
      - CG_NEO4J_URI=bolt://neo4j:7687
      - CG_LOG_LEVEL=INFO
      - CG_ARCHIVE_BACKEND=gcs
      - CG_ARCHIVE_GCS_BUCKET=engram-archives
      - CG_ARCHIVE_GCS_PREFIX=engram/archives
      - CG_ARCHIVE_GCS_ENDPOINT=http://fake-gcs:4443
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      fake-gcs:
        condition: service_healthy
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Orchestrator — demo chat UI backend (calls API + LLM)
  # -----------------------------------------------------------------------

  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.orchestrator
    ports:
      - "8100:8100"
    environment:
      - CG_API_URL=http://api:8000
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - DEMO_LLM_MODEL=${DEMO_LLM_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8100/api/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  redis-data:
  neo4j-data:
  gcs-data:
